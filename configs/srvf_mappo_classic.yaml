# Default SRVF-MAPPO classic Overcooked smoke configuration.

method: SRVF-MAPPO
benchmark: classic_overcooked

classic_overcooked:
  layout: cramped_room
  horizon: 400
  old_dynamics: false
  num_actions: 6
  encoding: overcooked_ai_py.lossless_state_encoding
  dependency_source: external/goat_overcooked/mapbt/envs/overcooked/overcooked_berkeley

model:
  factor_dim: 4
  hidden_dim: 128
  tau: 1.0
  phase_dim: 0
  detach_srvf_in_actor: true

belief:
  response_noise_var: 1.0
  alpha_low: 0.0
  alpha_high: 1.0
  ood_alpha_cap: 0.25

source_batch:
  batch_size: 256
  response_weight: 1.0
  value_weight: 1.0

rollout_batch:
  episodes_per_partner: 1
  horizon: 400
  gamma: 0.99
  gae_lambda: 0.95
  deterministic: false

resources:
  device: cuda
  policy_device: cuda
  worker_policy_device: cpu
  workers: 18
  torch_num_threads: 1
  learner_epochs: 4
  monitor_every: 1

validation:
  stage: batch_plumbing_smoke
  formal_performance_run: false
