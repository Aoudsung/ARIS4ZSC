backend: jaxmarl_overcooked_v2
layouts: [grounded_coord_simple, two_rooms]
max_depths: [2]
max_steps: 6
max_nodes: 1000
seed: 0
audited_agent_i: 0
step_mode: vectorized
batch_size: 128
jit_batch_step: false
reset_domain_tag: RESET_DEFAULT
tau_family:
  include: [first_move_choice, agent_inventory_nonempty, interface_changed_from_initial, time_at_least_2]
env_kwargs:
  random_reset: false
  random_agent_positions: false
