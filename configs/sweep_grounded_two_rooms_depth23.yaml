backend: jaxmarl_overcooked_v2
layouts:
  - grounded_coord_simple
  - two_rooms
max_depths: [2, 3]
max_steps: 8
max_nodes: 5000
seed: 0
audited_agent_i: 0
step_mode: vectorized
batch_size: 512
jit_batch_step: true
reset_domain_tag: RESET_DEFAULT
# Tau family generated from each reset public state. It uses represented public
# fields only; no policy labels or rollout outcomes enter tau construction.
tau_family:
  include:
    - first_move_choice
    - agent_inventory_nonempty
    - agent_facing_static_type
    - interface_changed_from_initial
    - recipe_equals_initial
    - time_at_least_2
env_kwargs:
  random_reset: false
  random_agent_positions: false
